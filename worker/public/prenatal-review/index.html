<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prenatal SVG Review</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #f5f5f2;
        color: #111;
      }
      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1;
      }
      p {
        margin: 0 0 20px;
        font-size: 16px;
        line-height: 1.4;
        max-width: 760px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }
      .card {
        background: white;
        border: 2px solid #111;
        padding: 12px;
      }
      .art {
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #111;
        background: #fff;
      }
      .art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .meta {
        margin-top: 10px;
      }
      .week {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        opacity: 0.6;
      }
      .name {
        margin-top: 3px;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.05;
      }
      .file {
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.3;
        word-break: break-word;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Prenatal SVG Review</h1>
      <p>Hand-authored black-and-white week-by-week produce art for the BabyCenter prenatal tracker.</p>
      <section class="grid" id="grid"></section>
    </main>
    <script>
      async function load() {
        const response = await fetch("/prenatal/images");
        const data = await response.json();
        const grid = document.getElementById("grid");

        for (const item of data.images) {
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            <div class="art"><img src="${item.image_url}" alt="${item.fruit_name}" loading="lazy"></div>
            <div class="meta">
              <div class="week">Week ${item.week}</div>
              <div class="name">${item.fruit_name}</div>
              <div class="file">${item.expected_filename}</div>
            </div>
          `;
          grid.appendChild(card);
        }
      }

      load();
    </script>
  </body>
</html>
